name: Build Orchestrator

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'FPC version to build (e.g., 3.2.3)'
        required: true
        type: string
      branch:
        description: 'Git branch to build from'
        required: true
        type: string
      bootstrap_fpc:
        description: 'Bootstrap FPC version'
        required: false
        default: '3.2.2'
        type: string
      run_tests:
        description: 'Run test suite'
        required: false
        default: 'false'
        type: string
      commit:
        description: 'Specific commit SHA (for release tagging)'
        required: false
        default: ''
        type: string
      tier:
        description: 'Which tier of cross-compilers to build'
        required: false
        default: 'tier1'
        type: choice
        options:
          - tier1
          - tier1,tier2
          - tier1,tier2,tier3
          - none
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      branch:
        type: string
        required: true
      bootstrap_fpc:
        type: string
        required: false
        default: '3.2.2'
      run_tests:
        type: string
        required: false
        default: 'false'
      commit:
        type: string
        required: false
        default: ''
      tier:
        type: string
        required: false
        default: 'tier1'

concurrency:
  group: build-fpc-${{ inputs.version }}
  cancel-in-progress: false

env:
  RELEASE_TAG: v${{ inputs.version }}-latest

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      cross_matrix_windows: ${{ steps.matrix.outputs.cross_matrix_windows }}
      cross_matrix_linux: ${{ steps.matrix.outputs.cross_matrix_linux }}
      cross_matrix_macos: ${{ steps.matrix.outputs.cross_matrix_macos }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate matrices
        id: matrix
        run: |
          python3 src/generate-build-matrix.py \
            --targets-config fpc-config/targets.json \
            --tier "${{ inputs.tier }}" \
            --version "${{ inputs.version }}"

  # ============ WINDOWS ============
  build-host-windows:
    needs: prepare
    uses: ./.github/workflows/build-fpc-host.yml
    with:
      os: windows-latest
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}
      bootstrap_fpc: ${{ inputs.bootstrap_fpc }}
      fpc_opt: ''
    secrets: inherit

  test-windows:
    needs: build-host-windows
    if: inputs.run_tests == 'true'
    uses: ./.github/workflows/run-fpc-tests.yml
    with:
      os: windows-latest
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-windows
    secrets: inherit

  build-cross-windows:
    needs: [prepare, build-host-windows]
    if: inputs.tier != 'none' && needs.prepare.outputs.cross_matrix_windows != '[]'
    uses: ./.github/workflows/build-fpc-cross.yml
    with:
      os: windows-latest
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-windows
      targets: ${{ needs.prepare.outputs.cross_matrix_windows }}
    secrets: inherit

  gate-windows:
    needs: [build-host-windows, test-windows, build-cross-windows]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.check.outputs.include }}
    steps:
      - name: Check Windows build status
        id: check
        run: |
          HOST="${{ needs.build-host-windows.result }}"
          TEST="${{ needs.test-windows.result }}"
          # Include if host succeeded AND (tests passed OR tests were skipped)
          if [[ "$HOST" == "success" && ("$TEST" == "success" || "$TEST" == "skipped") ]]; then
            echo "include=true" >> $GITHUB_OUTPUT
            echo "Windows: PASS"
          else
            echo "include=false" >> $GITHUB_OUTPUT
            echo "Windows: FAIL (host=$HOST, test=$TEST)"
          fi

  # ============ LINUX ============
  build-host-linux:
    needs: prepare
    uses: ./.github/workflows/build-fpc-host.yml
    with:
      os: ubuntu-latest
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}
      bootstrap_fpc: ${{ inputs.bootstrap_fpc }}
      fpc_opt: ''
    secrets: inherit

  test-linux:
    needs: build-host-linux
    if: inputs.run_tests == 'true'
    uses: ./.github/workflows/run-fpc-tests.yml
    with:
      os: ubuntu-latest
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-linux
    secrets: inherit

  build-cross-linux:
    needs: [prepare, build-host-linux]
    if: inputs.tier != 'none' && needs.prepare.outputs.cross_matrix_linux != '[]'
    uses: ./.github/workflows/build-fpc-cross.yml
    with:
      os: ubuntu-latest
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-linux
      targets: ${{ needs.prepare.outputs.cross_matrix_linux }}
    secrets: inherit

  gate-linux:
    needs: [build-host-linux, test-linux, build-cross-linux]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.check.outputs.include }}
    steps:
      - name: Check Linux build status
        id: check
        run: |
          HOST="${{ needs.build-host-linux.result }}"
          TEST="${{ needs.test-linux.result }}"
          if [[ "$HOST" == "success" && ("$TEST" == "success" || "$TEST" == "skipped") ]]; then
            echo "include=true" >> $GITHUB_OUTPUT
            echo "Linux: PASS"
          else
            echo "include=false" >> $GITHUB_OUTPUT
            echo "Linux: FAIL (host=$HOST, test=$TEST)"
          fi

  # ============ MACOS ============
  build-host-macos:
    needs: prepare
    uses: ./.github/workflows/build-fpc-host.yml
    with:
      os: macos-26-intel
      version: ${{ inputs.version }}
      branch: ${{ inputs.branch }}
      bootstrap_fpc: ${{ inputs.bootstrap_fpc }}
      fpc_opt: '-XR/Library/Developer/CommandLineTools/SDKs/MacOSX.sdk/'
    secrets: inherit

  test-macos:
    needs: build-host-macos
    if: inputs.run_tests == 'true'
    uses: ./.github/workflows/run-fpc-tests.yml
    with:
      os: macos-26-intel
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-macos
    secrets: inherit

  build-cross-macos:
    needs: [prepare, build-host-macos]
    if: inputs.tier != 'none' && needs.prepare.outputs.cross_matrix_macos != '[]'
    uses: ./.github/workflows/build-fpc-cross.yml
    with:
      os: macos-26-intel
      version: ${{ inputs.version }}
      host_bundle: fpc-${{ inputs.version }}-macos
      targets: ${{ needs.prepare.outputs.cross_matrix_macos }}
    secrets: inherit

  gate-macos:
    needs: [build-host-macos, test-macos, build-cross-macos]
    if: always()
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.check.outputs.include }}
    steps:
      - name: Check macOS build status
        id: check
        run: |
          HOST="${{ needs.build-host-macos.result }}"
          TEST="${{ needs.test-macos.result }}"
          if [[ "$HOST" == "success" && ("$TEST" == "success" || "$TEST" == "skipped") ]]; then
            echo "include=true" >> $GITHUB_OUTPUT
            echo "macOS: PASS"
          else
            echo "include=false" >> $GITHUB_OUTPUT
            echo "macOS: FAIL (host=$HOST, test=$TEST)"
          fi

  # ============ RELEASE ============
  create-release:
    needs: [gate-windows, gate-linux, gate-macos]
    if: always() && (needs.gate-windows.outputs.include == 'true' || needs.gate-linux.outputs.include == 'true' || needs.gate-macos.outputs.include == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        if: needs.gate-windows.outputs.include == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: fpc-${{ inputs.version }}-windows*
          path: artifacts
          merge-multiple: true

      - name: Download Linux artifacts
        if: needs.gate-linux.outputs.include == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: fpc-${{ inputs.version }}-linux*
          path: artifacts
          merge-multiple: true

      - name: Download macOS artifacts
        if: needs.gate-macos.outputs.include == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: fpc-${{ inputs.version }}-macos*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "Artifacts to release:"
          find artifacts -name "*.tar.gz" 2>/dev/null || echo "No artifacts found"

      - name: Generate release manifest
        run: |
          python3 src/generate-manifest.py \
            --version "${{ inputs.version }}" \
            --branch "${{ inputs.branch }}" \
            --commit "${{ inputs.commit }}" \
            --artifacts-dir artifacts \
            --output manifest.json

      - name: Create/Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ env.RELEASE_TAG }}"
          RELEASE_TITLE="FPC ${{ inputs.version }} (latest build)"

          # Build status
          WIN_STATUS="${{ needs.gate-windows.outputs.include == 'true' && 'included' || 'excluded (build/test failed)' }}"
          LIN_STATUS="${{ needs.gate-linux.outputs.include == 'true' && 'included' || 'excluded (build/test failed)' }}"
          MAC_STATUS="${{ needs.gate-macos.outputs.include == 'true' && 'included' || 'excluded (build/test failed)' }}"

          RELEASE_NOTES="Automated build of FPC ${{ inputs.version }} from branch ${{ inputs.branch }}

          **Commit:** ${{ inputs.commit }}
          **Build date:** $(date -u +%Y-%m-%d)

          **Platform status:**
          - Windows: ${WIN_STATUS}
          - Linux: ${LIN_STATUS}
          - macOS: ${MAC_STATUS}

          See manifest.json for available artifacts."

          # Delete existing release if present
          gh release delete "$RELEASE_TAG" --yes 2>/dev/null || true

          # Create new release
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes "$RELEASE_NOTES" \
            --prerelease

          # Upload all artifacts
          find artifacts -name "*.tar.gz" -exec gh release upload "$RELEASE_TAG" {} \; 2>/dev/null || true
          gh release upload "$RELEASE_TAG" manifest.json

  # ============ SUMMARY ============
  summary:
    needs: [gate-windows, gate-linux, gate-macos, create-release]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Build Summary
        run: |
          echo "# FPC ${{ inputs.version }} Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Included in Release |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Windows | ${{ needs.gate-windows.outputs.include }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | ${{ needs.gate-linux.outputs.include }} |" >> $GITHUB_STEP_SUMMARY
          echo "| macOS | ${{ needs.gate-macos.outputs.include }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Release | ${{ needs.create-release.result }} |" >> $GITHUB_STEP_SUMMARY
