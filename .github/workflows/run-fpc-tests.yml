name: Run FPC Tests

on:
  workflow_call:
    inputs:
      os:
        description: 'GitHub runner OS'
        type: string
        required: true
      version:
        description: 'FPC version being tested'
        type: string
        required: true
      host_bundle:
        description: 'Name of host bundle artifact'
        type: string
        required: true

jobs:
  test:
    name: Test (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download host bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.host_bundle }}
          path: ${{ github.workspace }}

      - name: Extract host bundle
        shell: bash
        run: |
          mkdir -p fpc
          cd fpc && tar -xzf "../${{ inputs.host_bundle }}.tar.gz"

      - name: Debug - List bundle structure
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find fpc -type f -name "fpc*" -o -name "ppc*" 2>/dev/null | head -50
          echo "=== installed/bin contents ==="
          ls -la fpc/installed/bin/ 2>/dev/null || echo "fpc/installed/bin/ not found"
          echo "=== installed/lib/fpc contents ==="
          ls -la fpc/installed/lib/fpc/ 2>/dev/null || echo "fpc/installed/lib/fpc/ not found"

      - name: Setup FPC environment
        shell: bash
        run: |
          # Convert Windows backslashes to forward slashes for bash compatibility
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "$WORKSPACE/fpc/installed/bin/i386-win32" >> $GITHUB_PATH
            FPC_PATH="$WORKSPACE/fpc/installed/bin/i386-win32/fpc.exe"
          else
            echo "$WORKSPACE/fpc/installed/bin" >> $GITHUB_PATH
            echo "$WORKSPACE/fpc/installed/lib/fpc/${{ inputs.version }}" >> $GITHUB_PATH
            FPC_PATH="$WORKSPACE/fpc/installed/bin/fpc"
          fi

          # Export to GITHUB_ENV for use in subsequent steps
          echo "TEST_FPC=$FPC_PATH" >> $GITHUB_ENV
          echo "TEST_WORKSPACE=$WORKSPACE" >> $GITHUB_ENV

          echo "=== Environment Setup ==="
          echo "TEST_FPC=$FPC_PATH"
          echo "TEST_WORKSPACE=$WORKSPACE"

          # Verify FPC exists
          if [ -f "$FPC_PATH" ]; then
            echo "FPC binary exists at $FPC_PATH"
            ls -la "$FPC_PATH"
          else
            echo "ERROR: FPC not found at $FPC_PATH"
            find "$WORKSPACE/fpc" -type f \( -name "fpc*" -o -name "ppc*" \) 2>/dev/null | head -20
            exit 1
          fi

      - name: Verify FPC installation
        shell: bash
        run: |
          echo "=== Verification ==="
          echo "TEST_FPC from env: $TEST_FPC"
          echo "PATH: $PATH"
          which fpc || echo "fpc not in PATH (expected, PATH updated in previous step)"
          echo "Testing FPC directly:"
          "$TEST_FPC" -iV

      - name: Run compiler tests
        working-directory: fpc/src/tests
        shell: bash
        run: |
          echo "=== Test Configuration ==="
          echo "TEST_FPC=$TEST_FPC"
          echo "TEST_OUTPUTDIR=$TEST_WORKSPACE/test-output"

          # Verify variables are set
          if [ -z "$TEST_FPC" ]; then
            echo "ERROR: TEST_FPC is empty!"
            exit 1
          fi

          # Verify FPC works
          echo "FPC version:"
          "$TEST_FPC" -iV

          # Run tests
          make clean
          make digest \
            TEST_FPC="$TEST_FPC" \
            TEST_OUTPUTDIR="$TEST_WORKSPACE/test-output" \
            FULL=1

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          echo "## Test Results for ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$TEST_WORKSPACE/test-output/log" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 "$TEST_WORKSPACE/test-output/log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test log found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.os }}
          path: ${{ github.workspace }}/test-output/
          retention-days: 7
          if-no-files-found: ignore
