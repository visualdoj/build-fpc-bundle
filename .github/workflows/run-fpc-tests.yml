name: Run FPC Tests

on:
  workflow_call:
    inputs:
      os:
        description: 'GitHub runner OS'
        type: string
        required: true
      version:
        description: 'FPC version being tested'
        type: string
        required: true
      host_bundle:
        description: 'Name of host bundle artifact'
        type: string
        required: true

jobs:
  test:
    name: Test (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Download host bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.host_bundle }}
          path: ${{ github.workspace }}

      - name: Extract host bundle
        shell: bash
        run: |
          mkdir -p fpc
          cd fpc && tar -xzf "../${{ inputs.host_bundle }}.tar.gz"

      - name: Debug - List bundle structure
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find fpc -type f -name "fpc*" -o -name "ppc*" 2>/dev/null | head -50
          echo "=== installed/bin contents ==="
          ls -la fpc/installed/bin/ 2>/dev/null || echo "fpc/installed/bin/ not found"
          echo "=== installed/lib/fpc contents ==="
          ls -la fpc/installed/lib/fpc/ 2>/dev/null || echo "fpc/installed/lib/fpc/ not found"

      - name: Add FPC to PATH and determine compiler
        id: fpc_path
        shell: bash
        run: |
          # Convert Windows backslashes to forward slashes for bash compatibility
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"

          if [ "${{ runner.os }}" = "Windows" ]; then
            echo "$WORKSPACE/fpc/installed/bin/i386-win32" >> $GITHUB_PATH
            FPC_PATH="$WORKSPACE/fpc/installed/bin/i386-win32/fpc.exe"
          else
            echo "$WORKSPACE/fpc/installed/bin" >> $GITHUB_PATH
            echo "$WORKSPACE/fpc/installed/lib/fpc/${{ inputs.version }}" >> $GITHUB_PATH
            FPC_PATH="$WORKSPACE/fpc/installed/bin/fpc"
          fi

          echo "fpc=$FPC_PATH" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT

          echo "Using FPC at: $FPC_PATH"
          if [ -f "$FPC_PATH" ]; then
            echo "FPC binary exists"
            ls -la "$FPC_PATH"
          else
            echo "ERROR: FPC not found at $FPC_PATH"
            echo "Listing bundle structure:"
            find "$WORKSPACE/fpc" -type f -name "fpc*" -o -name "ppc*" 2>/dev/null | head -20
            exit 1
          fi

      - name: Verify FPC installation
        shell: bash
        run: |
          echo "PATH=$PATH"
          which fpc || echo "fpc not in PATH"
          "${{ steps.fpc_path.outputs.fpc }}" -i

      - name: Run compiler tests
        working-directory: fpc/src/tests
        shell: bash
        run: |
          FPC_PATH="${{ steps.fpc_path.outputs.fpc }}"
          WORKSPACE="${{ steps.fpc_path.outputs.workspace }}"

          echo "=== Test Configuration ==="
          echo "TEST_FPC=$FPC_PATH"
          echo "TEST_OUTPUTDIR=$WORKSPACE/test-output"
          echo "FPC version:"
          "$FPC_PATH" -iV

          make clean
          make digest TEST_FPC="$FPC_PATH" \
            TEST_OUTPUTDIR="$WORKSPACE/test-output" \
            FULL=1

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          WORKSPACE="${{ steps.fpc_path.outputs.workspace }}"
          echo "## Test Results for ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$WORKSPACE/test-output/log" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 "$WORKSPACE/test-output/log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test log found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.os }}
          path: ${{ steps.fpc_path.outputs.workspace }}/test-output/
          retention-days: 7
          if-no-files-found: ignore
