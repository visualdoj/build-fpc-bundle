name: Run FPC Tests

on:
  workflow_call:
    inputs:
      os:
        description: 'GitHub runner OS'
        type: string
        required: true
      version:
        description: 'FPC version being tested'
        type: string
        required: true
      host_bundle:
        description: 'Name of host bundle artifact'
        type: string
        required: true

jobs:
  test:
    name: Test (${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - name: Set variables
        id: vars
        shell: bash
        run: |
          # Convert Windows backslashes to forward slashes
          WORKSPACE="${{ github.workspace }}"
          WORKSPACE="${WORKSPACE//\\//}"
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT

      - name: Check out
        uses: actions/checkout@v4

      - name: Download host bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.host_bundle }}
          path: ${{ github.workspace }}

      - name: Extract host bundle
        shell: bash
        run: |
          mkdir -p fpc
          cd fpc && tar -xzf "../${{ inputs.host_bundle }}.tar.gz"

      - name: Debug - List bundle structure
        shell: bash
        run: |
          echo "=== Bundle contents ==="
          find fpc -type f -name "fpc*" -o -name "ppc*" 2>/dev/null | head -50
          echo "=== installed/bin contents ==="
          ls -la fpc/installed/bin/ 2>/dev/null || echo "fpc/installed/bin/ not found"
          echo "=== installed/lib/fpc contents ==="
          ls -la fpc/installed/lib/fpc/ 2>/dev/null || echo "fpc/installed/lib/fpc/ not found"

      - name: Add FPC to PATH (non-Windows)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          echo "${{ steps.vars.outputs.workspace }}/fpc/installed/bin" >> $GITHUB_PATH
          echo "${{ steps.vars.outputs.workspace }}/fpc/installed/lib/fpc/${{ inputs.version }}" >> $GITHUB_PATH

      - name: Add FPC to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "${{ steps.vars.outputs.workspace }}/fpc/installed/bin/i386-win32" >> $GITHUB_PATH

      - name: Determine FPC path
        id: fpc_path
        shell: bash
        run: |
          WORKSPACE="${{ steps.vars.outputs.workspace }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            FPC_PATH="$WORKSPACE/fpc/installed/bin/i386-win32/fpc.exe"
          else
            FPC_PATH="$WORKSPACE/fpc/installed/bin/fpc"
          fi
          echo "fpc=$FPC_PATH" >> $GITHUB_OUTPUT
          echo "Using FPC at: $FPC_PATH"
          ls -la "$FPC_PATH" || echo "WARNING: FPC not found at expected path"

      - name: Verify FPC installation
        shell: bash
        run: fpc -i

      - name: Run compiler tests
        working-directory: fpc/src/tests
        shell: bash
        run: |
          WORKSPACE="${{ steps.vars.outputs.workspace }}"
          FPC_PATH="${{ steps.fpc_path.outputs.fpc }}"
          echo "TEST_FPC=$FPC_PATH"
          make clean
          make digest TEST_FPC="$FPC_PATH" \
            TEST_OUTPUTDIR="$WORKSPACE/test-output" \
            FULL=1

      - name: Generate test report
        if: always()
        shell: bash
        run: |
          WORKSPACE="${{ steps.vars.outputs.workspace }}"
          echo "## Test Results for ${{ inputs.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "$WORKSPACE/test-output/log" ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -100 "$WORKSPACE/test-output/log" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No test log found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ inputs.os }}
          path: ${{ steps.vars.outputs.workspace }}/test-output/
          retention-days: 7
          if-no-files-found: ignore
